<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #191919;
            color: white;
        }

        img {
            height: 50px;
        }

        .css-rps {
            background-color: transparent;
            height: 120px;
            width: 120px;
            border: 3px solid white;
            border-radius: 60px;
            margin-right: 10px;
            cursor: pointer;
        }

        .css-style-text {
            font-size: 25px;
            font-weight: bold;
            margin-top: 40px;
        }

        .css-rps-moves {
            border: none;
            height: 50px;
            width: auto;
        }

        .css-reset-button-style, .css-auto-button-style {
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
        }

        .css-score {
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <h2>Rock Paper Scissors Game</h2>
    <button class="css-rps js-rock"><img src="images/Rock-emoji.png" alt=""></button>
    <button class="css-rps js-paper"><img src="images/Paper-emoji.png" alt=""></button>
    <button class="css-rps js-scissors"><img src="images/Scissors-emoji.png" alt=""></button>
    <p class="js-result css-style-text"></p>
    <p class="js-moves"></p>
    <p class="js-score css-score"></p>
    <button class="css-reset-button-style">Reset Score</button>
    <button class="css-auto-button-style">Auto play</button>
    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            Wins: 0,
            Losses: 0,
            Ties: 0
        }
        updateScore();
        // let score = {
        //     Wins: 0,
        //     Losses: 0,
        //     Ties:0
        // }
        document.querySelector('.css-reset-button-style').addEventListener('click', resetScoreUser);
        function resetScoreUser() {

            score.Wins = 0;
            score.Losses = 0;
            score.Ties = 0;
            localStorage.removeItem('score');
            updateScore();
        }
        document.querySelector('.css-auto-button-style').addEventListener('click', autoPlay);
        isAutoplaying = false;
        let intervalId;
        function autoPlay() {
            if (!isAutoplaying){
                intervalId = setInterval( () => {
                let moves = pickcomputerMove();
                playGame(moves);
                isAutoplaying = true;
            }, 1000);
            } else {
                clearInterval(intervalId);
                isAutoplaying = false;
            }
            let autoPlayButton = document.querySelector('.css-auto-button-style');
            if (autoPlayButton.innerHTML === 'Auto play') {
                autoPlayButton.innerHTML = 'Stop auto play';
            } else {
                autoPlayButton.innerHTML = 'Auto play';
            }
        }
        document.querySelector('.js-rock').addEventListener('click', () => {
            playGame('Rock');
        });
        document.querySelector('.js-paper').addEventListener('click', () => {
            playGame('Paper');
        });
        document.querySelector('.js-scissors').addEventListener('click', () => {
            playGame('Scissors');
        }); 

        document.body.addEventListener('keydown', (event) => {
            if (event.key === 'r' || event.key === 'R') {
                playGame('Rock');
            } else if (event.key === 'p' || event.key === 'P') {
                playGame('Paper');
            } else if (event.key === 's' || event.key === 'S') {
                playGame('Scissors');
            }
        });
        function playGame(playerMove) {
            let computerMove = pickcomputerMove();
            let result;

            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie'
                } else if (computerMove === 'Paper') {
                    result = 'You lose'
                } else if (computerMove === 'Scissors') {
                    result = 'You win'
                }
            }
            else if (playerMove === 'Paper') {

                if (computerMove === 'Rock') {
                    result = 'You win'
                } else if (computerMove === 'Paper') {
                    result = 'Tie'
                } else if (computerMove === 'Scissors') {
                    result = 'You lose'
                }
            }
            else if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose'
                } else if (computerMove === 'Paper') {
                    result = 'You win'
                } else if (computerMove === 'Scissors') {
                    result = 'Tie'
                }

            }
            if (result === 'You win') {
                score.Wins += 1;
            } else if (result === 'You lose') {
                score.Losses += 1;
            } else if (result === 'Tie') {
                score.Ties += 1;
            }

            updateScore();
            document.querySelector('.js-result').innerHTML = result;
            document.querySelector('.js-moves').innerHTML = `You <img src="images/${playerMove}-emoji.png" alt="" class="css-rps css-rps-moves">
         <img src="images/${computerMove}-emoji.png" alt="" class="css-rps css-rps-moves"> Computer;`
            localStorage.setItem('score', JSON.stringify(score));

        }

        function updateScore() {
            document.querySelector('.js-score').innerHTML = `Wins: ${score.Wins}, Losses: ${score.Losses}, Ties: ${score.Ties}`;
        }
        function pickcomputerMove() {
            let randomMove = Math.random();
            let computerMove;
            if (randomMove > 0 && randomMove < 1 / 3) {
                computerMove = 'Rock'
            } else if (randomMove > 1 / 3 && randomMove < 2 / 3) {
                computerMove = 'Paper'
            } else if (randomMove > 2 / 3 && randomMove < 1) {
                computerMove = 'Scissors'
            }
            return computerMove;
        }
        // hello
    </script>
</body>

</html>
